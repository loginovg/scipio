services:
  postgres:
    image: postgres:16-alpine
    container_name: scipio-postgres
    environment:
      POSTGRES_DB: scipio
      POSTGRES_USER: scipio
      POSTGRES_PASSWORD: scipio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scipio -d scipio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: scipio-redis
    command: ["redis-server", "--port", "6380"]
    ports:
      - "6380:6380"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
